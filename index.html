<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klassenspiele · Lern Deutsch mit Arash</title>
<script data-goatcounter="https://aguitoo.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
<style>
  :root{
    --ink:#15212b;
    --ink-soft:#52646f;
    --paper:#f3f1ec;            /* warmes Papier */
    --card:#ffffff;
    --line:#e0ddd4;
    --accent:#c2410c;          /* Spielsteckkasten-Orange */
    --accent-soft:#fbe9df;
    --teal:#0d7268;
    --violet:#5b4b8a;
    --gold:#d8a32f;
    --shadow:0 1px 2px rgba(21,33,43,.06),0 10px 30px rgba(21,33,43,.08);
    --radius:16px;
  }
  *{box-sizing:border-box}
  body{
    margin:0;font-family:'Segoe UI',Calibri,system-ui,sans-serif;
    color:var(--ink);line-height:1.55;background:var(--paper);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1060px;margin:0 auto;padding:0 18px 70px}

  /* ---------- Hero ---------- */
  .hero{
    position:relative;overflow:hidden;
    margin:0 -18px 26px;padding:46px 32px 40px;
    background:
      radial-gradient(circle at 88% -20%, rgba(194,65,12,.14), transparent 45%),
      radial-gradient(circle at 5% 120%, rgba(13,114,104,.12), transparent 45%),
      #fffdf8;
    border-bottom:1px solid var(--line);
  }
  .hero .kicker{
    display:inline-block;font-size:.74rem;font-weight:800;letter-spacing:2px;
    text-transform:uppercase;color:var(--accent);margin-bottom:10px;
  }
  .hero h1{
    margin:0;font-size:2.5rem;letter-spacing:-1px;line-height:1.04;font-weight:800;
  }
  .hero p{margin:12px 0 0;max-width:560px;color:var(--ink-soft);font-size:1.04rem}
  /* dekorative Spielsteine */
  .pawns{position:absolute;right:30px;top:30px;display:flex;gap:9px}
  .pawn{width:20px;height:30px;border-radius:50% 50% 45% 45%/60% 60% 40% 40%;
    box-shadow:inset 0 -4px 6px rgba(0,0,0,.12)}
  .pawn:nth-child(1){background:var(--accent)}
  .pawn:nth-child(2){background:var(--teal);height:38px;align-self:flex-end}
  .pawn:nth-child(3){background:var(--gold);height:26px}
  .pawn:nth-child(4){background:var(--violet);height:34px;align-self:flex-end}
  @media(max-width:640px){.pawns{display:none}.hero h1{font-size:2rem}}

  /* ---------- Controls ---------- */
  .controls{
    display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;
    margin-bottom:22px;
  }
  .searchbox{flex:1 1 260px;position:relative}
  .searchbox input{
    width:100%;padding:13px 16px 13px 42px;border:1px solid var(--line);
    border-radius:12px;font-size:1rem;font-family:inherit;background:#fff;
  }
  .searchbox input:focus{outline:2px solid var(--accent);border-color:var(--accent)}
  .searchbox::before{
    content:"🔍";position:absolute;left:14px;top:50%;transform:translateY(-50%);
    font-size:.95rem;opacity:.6;
  }
  .filtergroup{display:flex;flex-direction:column;gap:6px}
  .filtergroup .lbl{font-size:.74rem;font-weight:800;letter-spacing:.6px;
    text-transform:uppercase;color:var(--ink-soft)}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{
    border:1px solid var(--line);background:#fff;color:var(--ink-soft);
    padding:7px 13px;border-radius:999px;font-size:.85rem;font-weight:600;
    cursor:pointer;transition:.13s;
  }
  .chip:hover{border-color:var(--accent);color:var(--accent)}
  .chip[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}

  /* ---------- Grid ---------- */
  .count-line{font-size:.85rem;color:var(--ink-soft);margin:0 0 14px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:18px}
  .game{
    display:flex;flex-direction:column;text-decoration:none;color:inherit;
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden;transition:.18s;
  }
  .game:hover{transform:translateY(-3px);box-shadow:0 6px 14px rgba(21,33,43,.10),0 20px 44px rgba(21,33,43,.13)}
  .game .banner{
    height:104px;position:relative;display:flex;align-items:flex-end;
    padding:14px;color:#fff;overflow:hidden;
  }
  .game .banner .emoji{
    position:absolute;right:12px;top:8px;font-size:2.6rem;opacity:.9;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.25));
  }
  .game .banner .topic-tag{
    font-size:.7rem;font-weight:800;letter-spacing:.6px;text-transform:uppercase;
    background:rgba(255,255,255,.22);padding:4px 10px;border-radius:999px;
    backdrop-filter:blur(2px);
  }
  .game .body{padding:15px 16px 17px;flex:1;display:flex;flex-direction:column}
  .game .body h3{margin:0 0 6px;font-size:1.16rem;letter-spacing:-.3px}
  .game .body .desc{margin:0;font-size:.9rem;color:var(--ink-soft);flex:1}
  .game .meta{display:flex;gap:7px;flex-wrap:wrap;margin-top:13px;align-items:center}
  .badge{font-size:.72rem;font-weight:700;padding:3px 9px;border-radius:6px}
  .badge.level{background:var(--accent-soft);color:var(--accent)}
  .badge.players{background:#eef0ee;color:var(--ink-soft)}
  .game .cta{
    margin-top:13px;font-size:.86rem;font-weight:800;color:var(--accent);
    display:flex;align-items:center;gap:5px;
  }
  .game .cta::after{content:"→";transition:.15s}
  .game:hover .cta::after{transform:translateX(4px)}

  .empty-state{
    grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--ink-soft);
    border:2px dashed var(--line);border-radius:var(--radius);
  }
  .empty-state .big{font-size:2rem;margin-bottom:8px}

  footer.foot{text-align:center;color:var(--ink-soft);font-size:.82rem;margin-top:42px}
  footer.foot a{color:var(--teal)}
</style>
</head>
<body>
<div class="wrap">

  <div class="hero">
    <div class="pawns"><span class="pawn"></span><span class="pawn"></span><span class="pawn"></span><span class="pawn"></span></div>
    <span class="kicker">Lern Deutsch mit Arash</span>
    <h1>Klassenspiele</h1>
    <p>Eine wachsende Sammlung interaktiver Spiele und Rollenspiele für den Unterricht – sortiert nach Thema und Niveau.</p>
  </div>

  <div class="controls">
    <div class="searchbox">
      <input id="search" type="text" placeholder="Spiel suchen…" autocomplete="off" aria-label="Spiel suchen">
    </div>
    <div class="filtergroup">
      <span class="lbl">Thema</span>
      <div class="chips" id="topicChips"></div>
    </div>
    <div class="filtergroup">
      <span class="lbl">Niveau</span>
      <div class="chips" id="levelChips"></div>
    </div>
  </div>

  <p class="count-line" id="countLine"></p>
  <div class="grid" id="grid"></div>

  <footer class="foot">
    Lern Deutsch mit Arash · <a href="https://arashguitoo.github.io">arashguitoo.github.io</a>
  </footer>
</div>

<script>
/* ============================================================
   SPIELE-KATALOG
   Neues Spiel? Einfach hier ein Objekt ergänzen.
   Felder:
     title, desc      – Anzeige
     url              – Link zum Spiel (Unterordner mit index.html)
     topic            – ein Thema aus THEMEN (siehe unten)
     levels           – Array, z.B. ["B1","B2"]
     players          – kurze Angabe, z.B. "Paare", "Gruppe"
     emoji            – Symbol fürs Banner
     color1, color2   – Banner-Verlauf
     added            – Datum (für „neu“-Sortierung, JJJJ-MM-TT)
   ============================================================ */
const GAMES = [
  {
    title:"Am Apparat",
    desc:"Telefonische Beratung bei der Agentur für Arbeit. Moderationskonsole mit Zufallspaarung, 20 Kunden-Rollenkarten (inkl. Azubis) und integrierten Sprachbausteinen.",
    url:"aa-telefon.html",
    topic:"Beruf & Bewerbung",
    levels:["B1","B2"],
    players:"Paare / Rotation",
    emoji:"📞",
    color1:"#0d7268", color2:"#0a564f",
    added:"2026-06-10"
  },
  {
    title:"Bürobedarf bestellen",
    desc:"Telefonische Bestellung beim Kundenservice. Verkäufer-Teams (Discounter & Premium) beraten Einkäufer-Teams mit Budget und Bedarfsliste – 2 Kataloge, 10 Kundenkarten, Bestellliste mit Budgetrechner.",
    url:"situation-01-buerobedarf.html",
    topic:"Beruf & Bewerbung",
    levels:["B1","B2"],
    players:"Teams",
    emoji:"🛍️",
    color1:"#b5451f", color2:"#8f3414",
    added:"2026-06-10"
  },
  {
    title:"Bewerbungsspiel",
    desc:"Mehrspieler-Spiel über Game-Code: Firmen und Bewerber:innen finden im Live-Spiel zusammen. Moderation per Konsole, Teilnehmende treten am eigenen Gerät bei. (Benötigt Internet/Firebase.)",
    url:"bewerbungsspiel.html",
    topic:"Beruf & Bewerbung",
    levels:["B1"],
    players:"Gruppe (online)",
    emoji:"🎯",
    color1:"#1b2538", color2:"#0f1724",
    added:"2026-06-19"
  }
  // ── Weitere Spiele hier ergänzen ──
];

/* Themen-Definition (Reihenfolge = Anzeige-Reihenfolge der Chips) */
const THEMEN = [
  "Beruf & Bewerbung",
  "Wortschatz",
  "Grammatik",
  "Kommunikation",
  "Landeskunde",
  "Spiel & Quiz"
];

/* ============================================================ */
const $ = s => document.querySelector(s);
const esc = s => s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

let activeTopic = "alle";
let activeLevel = "alle";
let query = "";

const ALL_LEVELS = ["A1","A2","B1","B2","C1"];

/* ---------- Chips bauen ---------- */
function buildChips(){
  const tc = $('#topicChips');
  tc.innerHTML = chipHTML("alle","Alle", activeTopic==="alle");
  THEMEN.forEach(t=>{ tc.innerHTML += chipHTML(t,t, activeTopic===t); });

  const lc = $('#levelChips');
  lc.innerHTML = chipHTML("alle","Alle", activeLevel==="alle");
  ALL_LEVELS.forEach(l=>{ lc.innerHTML += chipHTML(l,l, activeLevel===l); });
}
function chipHTML(val,label,active){
  return `<button class="chip" data-val="${esc(val)}" aria-pressed="${active}">${esc(label)}</button>`;
}

$('#topicChips').addEventListener('click',e=>{
  const b=e.target.closest('.chip'); if(!b)return;
  activeTopic=b.dataset.val; buildChips(); render();
});
$('#levelChips').addEventListener('click',e=>{
  const b=e.target.closest('.chip'); if(!b)return;
  activeLevel=b.dataset.val; buildChips(); render();
});
$('#search').addEventListener('input',e=>{ query=e.target.value.toLowerCase().trim(); render(); });

/* ---------- Filter + Render ---------- */
function render(){
  const list = GAMES.filter(g=>{
    if(activeTopic!=="alle" && g.topic!==activeTopic) return false;
    if(activeLevel!=="alle" && !g.levels.includes(activeLevel)) return false;
    if(query){
      const hay=(g.title+" "+g.desc+" "+g.topic+" "+g.players).toLowerCase();
      if(!hay.includes(query)) return false;
    }
    return true;
  }).sort((a,b)=> (b.added||"").localeCompare(a.added||""));

  $('#countLine').textContent =
    list.length===1 ? "1 Spiel" : `${list.length} Spiele`;

  if(!list.length){
    $('#grid').innerHTML = `<div class="empty-state">
      <div class="big">🎲</div>
      <strong>Kein Spiel gefunden.</strong><br>Andere Filter probieren oder Suche zurücksetzen.
    </div>`;
    return;
  }

  $('#grid').innerHTML = list.map(g=>`
    <a class="game" href="${esc(g.url)}">
      <div class="banner" style="background:linear-gradient(135deg,${esc(g.color1)},${esc(g.color2)})">
        <span class="emoji">${g.emoji||"🎮"}</span>
        <span class="topic-tag">${esc(g.topic)}</span>
      </div>
      <div class="body">
        <h3>${esc(g.title)}</h3>
        <p class="desc">${esc(g.desc)}</p>
        <div class="meta">
          ${g.levels.map(l=>`<span class="badge level">${esc(l)}</span>`).join('')}
          <span class="badge players">${esc(g.players)}</span>
        </div>
        <span class="cta">Spiel öffnen</span>
      </div>
    </a>`).join('');
}

/* ---------- Init ---------- */
buildChips();
render();
</script>
</body>
</html>
